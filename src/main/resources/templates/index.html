<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/style.css">

    <title>Thymeleaf</title>
</head>
<body>
<header class="line-white ">
    <div class="container">
        <div th:insert="fragments/nav :: nav"></div>
        <div th:insert="sections/personalinfo-section :: hero"></div>

    </div>
</header>

<main>
    <div class="container">
        <div class="line-white" th:insert="~{sections/about-section :: about}"></div>
        <div class="line-white"  th:insert="~{sections/education-section :: education}"></div>
        <div class="line-white"  th:insert="~{sections/skills-section :: skills}"></div>
        <div class="line-white"  th:insert="~{sections/experience-section :: experience}"></div>
        <div class="line-white"  th:insert="~{sections/projects-section :: projects}"></div>
        <div  th:insert="~{sections/contact-section :: contact}"></div>

    </div>
</main>

<div th:insert="fragments/footer :: footer"></div>
</body>
</html>
