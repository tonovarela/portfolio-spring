<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .error-message {
        color: red;
        }


        input[type="file"]::file-selector-button {
    background-color: var(--color-primary-gold); /* Dorado */
    color: var(--color-dark); /* Texto oscuro */
    padding: 0.8rem 1.5rem;
    border: none;
    border-radius: 0.3rem;
    cursor: pointer;
    font-weight: bold;
    margin-right: 1rem;
    transition: background-color 0.3s ease;
}
input[type="file"]::file-selector-button:hover {
    background-color: var(--color-dark); /* Oscuro al pasar el ratón */
    color: var(--color-primary-gold); /* Texto dorado al pasar el ratón */
}
    </style>
    <title>Formulario</title>
</head>
<body>
<header>
    <div class="container">
        <div th:insert="fragments/nav :: nav"></div>
    </div>
</header>
<main>
    <div class="container">
    <section id="contact" style="height: 80vh;">
        <h2>Formulario de proyecto</h2>
        <form class="contact-form" th:action="@{/projects/save}" th:object="${projectDTO}" method="post" enctype="multipart/form-data">

            <input id="Title" placeholder="Title" type="text" th:field="*{title}"><br><br>
            <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="error-message"></div>


            <textarea id="description" rows="5" placeholder="Description" th:field="*{description}">
                </textarea>
                <br><br>
            <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error-message"></div>


            <input id="projectUrl" type="text" placeholder="Project URL" th:field="*{projectUrl}"><br><br>
            <div th:if="${#fields.hasErrors('projectUrl')}" th:errors="*{projectUrl}" class="error-message"></div>


            <input id="personalInfoId" type="number" min="1" th:field="*{personalInfoId}"><br><br>


            <input id="file" name="file" type="file" accept="image/*"><br><br>


            <button type="submit">Enviar</button>

        </form>

    </section>
    </div>
</main>
<div th:insert="fragments/footer :: footer"></div>

</body>
</html>
