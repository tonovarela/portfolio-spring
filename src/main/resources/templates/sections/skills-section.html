
<section id="skills" xmlns:th="http://www.thymeleaf.org"  th:fragment="skills" >

    <h2> MY SKILLS</h2>
    <div class="skills-grid">
        <div class="skill-card"  th:each="skill : ${skillsList}">
            <img th:src="${skill.iconClass}" th:alt="${skill.name}" >
            <h3 th:text="${skill.name}"></h3>
        </div>
    </div>


</section>
