<section id="projects"  xmlns:th="http://www.thymeleaf.org"  th:fragment="projects" >
    <h2>MY PROJECTS</h2>
    <div class="projects-grid">
        <div class="project-card" th:each="project : ${projectList}">
            <img th:src="@{${project.imageUrl}}"  alt="Project Image">
            <h3 th:text="${project.title}"></h3>
            <p th:text="${project.description}"></p>
            <a th:href="${project.projectUrl}" target="_blank">View Project</a>


        </div>
    </div>
</section>
