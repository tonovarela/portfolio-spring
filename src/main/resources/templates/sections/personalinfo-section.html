<section xmlns:th="http://www.thymeleaf.org"  th:fragment="hero" >

    <div class="hero-section">
        <h1>I'm <span th:text="${personalInfo.firstName} + ' '+ ${personalInfo.lastName} "></span> <br>Full Stack Developer</h1>
        <div class="profile-image-container">
            <img th:src="${personalInfo.profileImageUrl}" th:alt="${personalInfo.firstName}" class="profile-picture">
        </div>
        <p th:text="${personalInfo.profileDescription}"></p>

        <button>MY PROJECTS</button>
    </div>

</section>
